app:
  jwt:
    secret: ${JWT_SECRET:test-jwt-secret-with-at-least-256-bits-for-hs256-algorithm}
    issuer: ${spring.application.name}
    expiration: 1h
  security:
    username: ${SECURITY_NAME:admin}
    password: ${SECURITY_PASSWORD:admin}
  rate-limit:
    capacity: 100
    refill-minutes: 1

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native

spring:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      password: ${REDIS_PASSWORD:redis}
  cloud:
    aws:
      sqs:
        endpoint: ${AWS_ENDPOINT:http://localhost:9324}
      region:
        static: ${AWS_REGION:sa-east-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY:admin}
        secret-key: ${AWS_SECRET_KEY:admin}
  cache:
    type: redis
    redis:
      key-prefix: "dop::" # delivery-orders-api
      time-to-live: 300s
      cache-null-values: false
  application:
    name: delivery-orders-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:db_delivery_orders}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    root: ${LOG_LEVEL_ROOT:WARN}
    br.com.paulohenrique: ${LOG_LEVEL_APP:INFO}
  structured:
    format:
      console: ${LOG_FORMAT:}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    persist-authorization: true
    default-models-expand-depth: -1
  default-flat-param-object: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  override-with-generic-response: false

management:
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:never}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:info,health}
