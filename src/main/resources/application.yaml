app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${spring.application.name}
    expiration: 1h
  security:
    username: ${SECURITY_NAME}
    password: ${SECURITY_PASSWORD}
  rate-limit:
    capacity: 100
    refill-minutes: 1

server:
  port: ${SERVER_PORT}
  forward-headers-strategy: native

spring:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2s
      password: ${REDIS_PASSWORD}
  cache:
    type: redis
    redis:
      key-prefix: "dop::" # delivery-orders-api
      time-to-live: 300s
      cache-null-values: false
  application:
    name: delivery-orders-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
  default-flat-param-object: true
